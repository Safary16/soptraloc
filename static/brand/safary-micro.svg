<!-- perfil humano abierto: nariz/mentón en una sola muesca ancha -->
<path d="M62 34c4-8 11-13 20-14 8-1 15 1 21 7-7-2-13-1-18 3-4 3-6 7-7 11l-7 3 4 5-4 5 5 3-1 7c-4 3-8 5-13 5-5-6-8-13-8-21 0-5 1-10 4-14z" fill="#fff"/>
<!-- Safary delante: oreja triangular, hocico largo y pecho -->
<path d="M47 49 24 27l4 29C15 59 5 68-1 81l-7 14 20 8 28-1c13-1 24-8 30-19 6-11 5-23-1-33-5-8-13-14-22-17zM38 101c18 1 32 8 41 20H8c7-11 17-18 30-20z"/>
