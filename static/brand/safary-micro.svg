<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc" color="#000">
<title id="title">Micro-isotipo Safary</title><desc id="desc">Dos perfiles simplificados: Safary delante y Sebastián detrás.</desc>
<g fill="currentColor">
