{% extends 'base.html' %}
{% block title %}Conductores - SoptraLoc{% endblock %}
{% block content %}
<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div><h1 class="display-6"><i class="fas fa-users"></i> Conductores</h1><p class="text-muted mb-0">Datos maestros, disponibilidad y accesos</p></div>
    <button class="btn btn-success" onclick="openDriver()"><i class="fas fa-plus"></i> Nuevo conductor</button>
  </div>
  <div id="notice"></div>
  <div class="row g-2 mb-3">
    <div class="col-md-3"><select class="form-select" id="filter-presente"><option value="">Todos</option><option value="true">Presentes</option><option value="false">Ausentes</option></select></div>
    <div class="col-md-3"><select class="form-select" id="filter-activo"><option value="">Todos los estados</option><option value="true">Activos</option><option value="false">Inactivos</option></select></div>
    <div class="col-md-4"><input class="form-control" id="search-driver" placeholder="Buscar nombre, RUT, patente o teléfono"></div>
    <div class="col-md-2"><button class="btn btn-primary w-100" onclick="loadDrivers()">Buscar</button></div>
  </div>
  <div class="card"><div class="card-body table-responsive">
    <table class="table table-hover align-middle"><thead class="table-dark"><tr><th>Acciones</th><th>Nombre</th><th>RUT</th><th>Patente</th><th>Teléfono</th><th>Estado</th><th>Presente</th><th>Entregas</th><th>Cumplimiento</th></tr></thead><tbody id="drivers-tbody"></tbody></table>
    <div class="d-flex justify-content-between"><span id="pagination-info"></span><div><button class="btn btn-sm btn-outline-secondary" id="prev" onclick="loadDrivers(currentPage-1)">Anterior</button> <button class="btn btn-sm btn-outline-secondary" id="next" onclick="loadDrivers(currentPage+1)">Siguiente</button></div></div>
  </div></div>
</div>

<div class="modal fade" id="driverModal" tabindex="-1"><div class="modal-dialog"><form class="modal-content" id="driverForm">
  <div class="modal-header"><h5 class="modal-title" id="driverTitle">Conductor</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body"><input type="hidden" id="driver-id"><div class="row g-3">
    <div class="col-12"><label class="form-label">Nombre *</label><input class="form-control" id="nombre" required maxlength="200"></div>
    <div class="col-md-6"><label class="form-label">RUT</label><input class="form-control" id="rut" maxlength="20"></div>
    <div class="col-md-6"><label class="form-label">Patente</label><input class="form-control" id="patente" maxlength="20"></div>
    <div class="col-12"><label class="form-label">Teléfono</label><input class="form-control" id="telefono" maxlength="20"></div>
    <div class="col-md-6"><label class="form-label">Máx. entregas/día</label><input class="form-control" id="max_entregas_dia" type="number" min="1" value="3"></div>
    <div class="col-md-6"><label class="form-label">Cumplimiento %</label><input class="form-control" id="cumplimiento_porcentaje" type="number" min="0" max="100" step="0.01" value="100"></div>
    <div class="col-6 form-check ms-3"><input class="form-check-input" type="checkbox" id="presente" checked><label class="form-check-label">Presente</label></div>
    <div class="col-5 form-check"><input class="form-check-input" type="checkbox" id="activo" checked><label class="form-check-label">Activo</label></div>
  </div></div>
  <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary">Guardar</button></div>
</form></div></div>
<script>
let currentPage=1, modal; const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const csrf=()=>document.cookie.split('; ').find(x=>x.startsWith('csrftoken='))?.split('=')[1]||'';
function notice(text,type='success'){document.getElementById('notice').innerHTML=`<div class="alert alert-${type} alert-dismissible">${esc(text)}<button class="btn-close" data-bs-dismiss="alert"></button></div>`}
async function api(url,opts={}){opts.headers={...(opts.headers||{}),'X-CSRFToken':csrf()};if(opts.body)opts.headers['Content-Type']='application/json';const r=await fetch(url,opts);let d={};try{d=await r.json()}catch{}if(!r.ok)throw new Error(JSON.stringify(d));return d}
async function loadDrivers(page=1){currentPage=Math.max(1,page);const q=new URLSearchParams({page:currentPage});['presente','activo'].forEach(id=>{let v=document.getElementById('filter-'+id).value;if(v)q.set(id,v)});let search=document.getElementById('search-driver').value;if(search)q.set('search',search);try{const d=await api('/api/drivers/?'+q);const rows=d.results||d;document.getElementById('drivers-tbody').innerHTML=rows.length?rows.map(x=>`<tr><td><button class="btn btn-sm btn-primary" onclick='openDriver(${JSON.stringify(x)})'><i class="fas fa-edit"></i></button> <button class="btn btn-sm btn-warning" onclick="resetAccess(${x.id})" title="Regenerar acceso"><i class="fas fa-key"></i></button> <button class="btn btn-sm btn-outline-danger" onclick="deactivate(${x.id},'${esc(x.nombre)}')" title="Desactivar"><i class="fas fa-ban"></i></button></td><td><strong>${esc(x.nombre)}</strong></td><td>${esc(x.rut||'-')}</td><td>${esc(x.patente||'-')}</td><td>${esc(x.telefono||'-')}</td><td><span class="badge bg-${x.activo?'success':'secondary'}">${x.activo?'Activo':'Inactivo'}</span></td><td>${x.presente?'Sí':'No'}</td><td>${x.num_entregas_dia}/${x.max_entregas_dia}</td><td>${x.cumplimiento_porcentaje}%</td></tr>`).join(''):'<tr><td colspan="9" class="text-center">Sin resultados</td></tr>';document.getElementById('pagination-info').textContent=`${d.count??rows.length} conductores`;document.getElementById('prev').disabled=!d.previous;document.getElementById('next').disabled=!d.next}catch(e){notice('No fue posible cargar conductores: '+e.message,'danger')}}
function openDriver(x=null){document.getElementById('driverForm').reset();document.getElementById('driver-id').value=x?.id||'';document.getElementById('driverTitle').textContent=x?'Editar conductor':'Nuevo conductor';for(const k of ['nombre','rut','patente','telefono','max_entregas_dia','cumplimiento_porcentaje'])if(x?.[k]!=null)document.getElementById(k).value=x[k];for(const k of ['presente','activo'])document.getElementById(k).checked=x?!!x[k]:true;modal.show()}
document.addEventListener('DOMContentLoaded',()=>{modal=new bootstrap.Modal('#driverModal');loadDrivers()});
document.getElementById('driverForm').addEventListener('submit',async e=>{e.preventDefault();const id=document.getElementById('driver-id').value;const body={};for(const k of ['nombre','rut','patente','telefono','max_entregas_dia','cumplimiento_porcentaje'])body[k]=document.getElementById(k).value;body.presente=document.getElementById('presente').checked;body.activo=document.getElementById('activo').checked;try{const d=await api(id?`/api/drivers/${id}/`:'/api/drivers/',{method:id?'PATCH':'POST',body:JSON.stringify(body)});modal.hide();loadDrivers(currentPage);notice(d.acceso_temporal?`Conductor creado. Acceso temporal (copiar ahora): ${d.acceso_temporal.username} / ${d.acceso_temporal.temporary_password}`:'Conductor actualizado.')}catch(e){notice('No se pudo guardar: '+e.message,'danger')}});
async function deactivate(id,name){if(!confirm(`¿Desactivar a ${name}? Su historial se conservará.`))return;try{await api(`/api/drivers/${id}/`,{method:'DELETE'});loadDrivers(currentPage);notice('Conductor desactivado.')}catch(e){notice(e.message,'danger')}}
async function resetAccess(id){if(!confirm('¿Regenerar la contraseña temporal? La anterior dejará de funcionar.'))return;try{const d=await api(`/api/drivers/${id}/reset-access/`,{method:'POST'});notice(`Acceso temporal (copiar ahora): ${d.acceso_temporal.username} / ${d.acceso_temporal.temporary_password}`,'warning')}catch(e){notice(e.message,'danger')}}
</script>
{% endblock %}
