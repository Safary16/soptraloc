<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Portal Cliente · SoptraLoc</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#172554,#2563eb);font-family:system-ui}.card{width:min(430px,92vw);border:0;border-radius:22px;box-shadow:0 24px 70px #0005}.brand{color:#2563eb}</style></head><body><div class="card p-4 p-md-5"><div class="text-center mb-4"><i class="fa-solid fa-warehouse fa-3x brand"></i><h1 class="h3 mt-3">Portal Cliente</h1><p class="text-muted">Stock y solicitudes de recepción</p></div>{% for message in messages %}<div class="alert alert-danger">{{ message }}</div>{% endfor %}<form method="post">{% csrf_token %}<label class="form-label">Usuario</label><input name="username" class="form-control form-control-lg mb-3" required autofocus><label class="form-label">Contraseña</label><input name="password" type="password" class="form-control form-control-lg mb-4" required><button class="btn btn-primary btn-lg w-100"><i class="fa-solid fa-right-to-bracket"></i> Ingresar</button></form></div></body></html>
