{% extends 'base.html' %}{% block title %}Solicitudes de clientes · Operaciones{% endblock %}{% block content %}
<div class="container-fluid py-4"><div class="d-flex justify-content-between align-items-center mb-4"><div><h1 class="h2"><i class="fas fa-calendar-check"></i> Solicitudes de clientes</h1><p class="text-muted">Operaciones conserva la decisión final sobre cada ventana.</p></div><button class="btn btn-outline-primary" onclick="load()"><i class="fas fa-rotate"></i> Actualizar</button></div><div id="notice"></div><div class="card"><div class="card-header d-flex gap-2 align-items-center"><strong>Bandeja</strong><select id="filter" class="form-select form-select-sm" style="max-width:180px" onchange="load()"><option value="pendiente">Pendientes</option><option value="">Todas</option><option value="aceptada">Aceptadas</option><option value="ajustada">Ajustadas</option><option value="rechazada">Rechazadas</option></select></div><div class="table-responsive"><table class="table align-middle mb-0"><thead><tr><th>Empresa</th><th>Contenedor</th><th>CD</th><th>Solicitado</th><th>Origen</th><th>Explicación</th><th>Acciones</th></tr></thead><tbody id="rows"></tbody></table></div></div></div>
<div class="modal fade" id="review"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>Revisar solicitud</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input id="rid" type="hidden"><label class="form-label">Inicio confirmado</label><input id="start" type="datetime-local" class="form-control mb-2"><label class="form-label">Fin confirmado</label><input id="end" type="datetime-local" class="form-control mb-2"><label class="form-label">Respuesta al cliente</label><textarea id="answer" class="form-control"></textarea></div><div class="modal-footer"><button class="btn btn-danger" onclick="decide('rechazada')">Rechazar</button><button class="btn btn-warning" onclick="decide('ajustada')">Ajustar</button><button class="btn btn-success" onclick="decide('aceptada')">Aceptar</button></div></div></div></div>
<script>let items=[];const csrf=()=>document.cookie.split('; ').find(x=>x.startsWith('csrftoken='))?.split('=')[1]||'';const local=x=>x?new Date(x).toLocaleString('es-CL'):'—';const input=x=>{let d=new Date(x);d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,16)};async function load(){let r=await fetch('/api/operaciones/solicitudes-clientes/?estado='+filter.value),d=await r.json();items=d.results||[];rows.innerHTML=items.map((x,i)=>`<tr><td>${x.empresa_nombre}</td><td><b>${x.container_id}</b></td><td>${x.cd_nombre}</td><td>${local(x.inicio_solicitado)}<br><small>${local(x.fin_solicitado)}</small></td><td>${x.modo}</td><td><small>${x.recomendacion_snapshot?.explicacion||x.observaciones_cliente||'—'}</small></td><td>${x.estado==='pendiente'?`<button class="btn btn-sm btn-primary" onclick="openReview(${i})">Revisar</button>`:x.estado}</td></tr>`).join('')||'<tr><td colspan=7 class="text-center text-muted py-4">Sin solicitudes</td></tr>'}function openReview(i){let x=items[i];rid.value=x.id;start.value=input(x.inicio_solicitado);end.value=input(x.fin_solicitado);answer.value='';new bootstrap.Modal(review).show()}async function decide(decision){let r=await fetch(`/api/operaciones/solicitudes-clientes/${rid.value}/revisar/`,{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':csrf()},body:JSON.stringify({decision,inicio:start.value,fin:end.value,respuesta:answer.value})}),d=await r.json();if(!r.ok){notice.innerHTML=`<div class="alert alert-danger">${d.error||'Error'}</div>`;return}bootstrap.Modal.getInstance(review).hide();notice.innerHTML='<div class="alert alert-success">Solicitud procesada.</div>';load()}load();</script>
{% endblock %}
