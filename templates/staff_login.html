{% load static %}<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Acceso interno · Safary</title><link rel="icon" href="{% static 'img/safary-sebastian-mark.svg' %}"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{min-height:100vh;display:grid;place-items:center;background:#f3f4f6;font-family:system-ui}.card{width:min(440px,92vw);border:0;border-radius:24px;box-shadow:0 24px 60px #0002}.mark{height:120px;max-width:100%;object-fit:contain}</style></head><body><div class="card p-4 p-md-5"><img class="mark" src="{% static 'img/safary-sebastian-mark.svg' %}" alt="Safary y Sebastián"><h1 class="h3 text-center">Acceso interno</h1><p class="text-muted text-center">Operaciones y Control</p>{% for message in messages %}<div class="alert alert-danger">{{ message }}</div>{% endfor %}<form method="post">{% csrf_token %}<input type="hidden" name="next" value="{{ next }}"><label class="form-label">Usuario</label><input name="username" class="form-control form-control-lg mb-3" required autofocus><label class="form-label">Contraseña</label><input name="password" type="password" class="form-control form-control-lg mb-4" required><button class="btn btn-dark btn-lg w-100">Ingresar</button></form><a href="{% url 'role_landing' %}" class="text-center mt-3">Volver a perfiles</a></div></body></html>
