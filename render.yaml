services:
  # Web Service
  - type: web
    name: soptraloc
    runtime: python
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "./start.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: soptraloc-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PYTHONPATH
        value: "."
      - key: DB_STARTUP_MAX_ATTEMPTS
        value: "12"
      - key: DB_STARTUP_RETRY_SECONDS
        value: "5"

databases:
  - name: soptraloc-db
    databaseName: soptraloc
    user: soptraloc
    plan: free
